<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BSAI - BTC 15M Signal</title>
    <style>
        /* 폰 화면에서도 요소들이 겹치지 않게 세로로 정렬 및 스크롤 허용 */
        body { 
            background-color: #0c0c0c; 
            color: #ffffff; 
            font-family: 'Arial', sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: flex-start; /* 위에서부터 차례대로 배치 */
            min-height: 100vh; 
            margin: 0; 
            padding: 40px 20px; 
            box-sizing: border-box; 
            overflow-y: auto; /* 내용이 많으면 폰에서 부드럽게 스크롤 되도록 */
        }
        
        /* 👽 새로 추가된 시그니처 문구 스타일 (완벽한 볼드 및 폰 최적화) */
        .alien-title { 
            font-size: 16px; 
            font-weight: 800; /* 완전 두껍게 볼드 처리 */
            color: #ff6600; 
            margin-bottom: 8px; 
            letter-spacing: 1px; 
            text-align: center; 
            line-height: 1.4;
            max-width: 500px; /* 너무 퍼지지 않게 잡아줌 */
            word-break: keep-all; /* 한글/영어 단어 단위로 깔끔하게 줄바꿈 */
        }
        @media (min-width: 768px) {
            .alien-title { font-size: 20px; } /* PC 화면에서는 살짝 더 크게 */
        }

        .alarm-status { font-size: 12px; color: #666; margin-bottom: 40px; background: #111; padding: 4px 10px; border-radius: 20px; border: 1px solid #222; text-align: center; }
        
        /* 📱 타점이 후원상자에 절대 가려지지 않도록 공간 확보 및 반응형 크기 조절 */
        .signal-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 200px;
            margin-bottom: 40px; /* 아래 후원상자와의 간격 강제 확보 */
        }
        
        .signal { font-size: 75px; font-weight: 900; text-transform: uppercase; transition: all 0.5s ease; text-shadow: 0 0 20px rgba(255,255,255,0.1); text-align: center; }
        @media (min-width: 768px) {
            .signal { font-size: 10vw; } /* PC 화면에서는 기존처럼 웅장하게 확대 */
        }

        .wait { color: #555555; }
        .buy { color: #00ff66; text-shadow: 0 0 50px rgba(0,255,102,0.6); }
        .sell { color: #ff3333; text-shadow: 0 0 50px rgba(255,51,51,0.6); }
        
        /* 🕹️ 제어 패널 (일반인 주소에선 흔적도 없이 사라짐) */
        .admin-panel { display: none; gap: 10px; margin-bottom: 40px; z-index: 10; flex-wrap: wrap; justify-content: center; width: 100%; max-width: 400px; }
        .btn { font-size: 18px; font-weight: bold; padding: 12px 25px; border: none; border-radius: 8px; cursor: pointer; transition: 0.2s; flex: 1; min-width: 80px; text-align: center; }
        .btn-buy { background: #00ff66; color: #000; }
        .btn-wait { background: #555; color: #fff; }
        .btn-sell { background: #ff3333; color: #fff; }
        .btn:hover { transform: scale(1.05); }

        /* 절대 좌표(absolute)를 풀어서 화면 맨 아래에 자연스럽게 안착시킴 */
        .donation-box { display: flex; flex-direction: column; align-items: center; background: #151515; padding: 15px 20px; border-radius: 12px; border: 1px solid #222; width: 100%; max-width: 340px; box-sizing: border-box; margin-top: auto; }
        .donation-text { font-size: 11px; color: #aaa; margin-bottom: 10px; text-align: center; line-height: 1.4; }
        .qr-code { width: 110px; height: 110px; margin-bottom: 12px; border-radius: 6px; }
        .wallet-container { display: flex; align-items: center; background: #000; padding: 6px 10px; border-radius: 6px; width: 100%; box-sizing: border-box; justify-content: space-between; }
        .wallet-addr { font-size: 11px; color: #888; font-family: monospace; max-width: 75%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .copy-btn { background: #ff6600; color: white; border: none; padding: 5px 10px; border-radius: 4px; font-size: 11px; cursor: pointer; font-weight: bold; flex-shrink: 0; }
    </style>
</head>
<body>

    <div class="alien-title">The World’s Best Predictive AI: Engineered by Aliens, Making Wall Street Look Like an Amateur</div>
    
    <div id="alarmInfo" class="alarm-status">🔊 Click anywhere to enable sound alerts</div>
    
    <div class="signal-container">
        <div id="signalDisplay" class="signal wait">WAIT</div>
    </div>

    <div id="adminPanel" class="admin-panel">
        <button class="btn btn-buy" id="btnBuy">BUY</button>
        <button class="btn btn-wait" id="btnWait">WAIT</button>
        <button class="btn btn-sell" id="btnSell">SELL</button>
    </div>

    <div class="donation-box">
        <div class="donation-text">This tool is 100% free. Buy me a coffee if this helped! ☕<br><strong style="color:#00ff66;">USDT (TRC-20 Network only)</strong></div>
        <img class="qr-code" src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=0xd5268a702bcbfef79e41b429be8a4f73285c32cd" alt="QR Code">
        <div class="wallet-container">
            <span class="wallet-addr" id="walletAddr">0xd5268a702bcbfef79e41b429be8a4f73285c32cd</span>
            <button class="copy-btn" id="btnCopy">COPY</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // 파이어베이스 주소 고정 유지
        const FIREBASE_DB_URL = 'https://fbtc-f9144-default-rtdb.firebaseio.com/';

        const app = initializeApp({ databaseURL: FIREBASE_DB_URL });
        const database = getDatabase(app);
        const signalRef = ref(database, 'live_signal/status');

        let currentSignal = 'WAIT';
        let audioCtx = null;

        const isAdmin = window.location.search.includes('admin');
        if (isAdmin) {
            document.getElementById('adminPanel').style.display = 'flex';
        }

        window.addEventListener('click', () => {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                document.getElementById('alarmInfo').innerText = '🔔 Sound alerts are active';
                document.getElementById('alarmInfo').style.color = '#00ff66';
            }
        });

        function playAlarmSound(type) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            if (type === 'BUY') {
                osc.frequency.setValueAtTime(880, audioCtx.currentTime); gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                osc.start(); osc.stop(audioCtx.currentTime + 0.15);
                setTimeout(() => {
                    const o2 = audioCtx.createOscillator(); const g2 = audioCtx.createGain();
                    o2.connect(g2); g2.connect(audioCtx.destination);
                    o2.frequency.setValueAtTime(880, audioCtx.currentTime); g2.gain.setValueAtTime(0.3, audioCtx.currentTime);
                    o2.start(); o2.stop(audioCtx.currentTime + 0.15);
                }, 200);
            } else if (type === 'SELL') {
                osc.frequency.setValueAtTime(330, audioCtx.currentTime); gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
                osc.start(); osc.stop(audioCtx.currentTime + 0.4);
            }
        }

        function applySignal(nextSignal, triggerSound = true) {
            const display = document.getElementById('signalDisplay');
            if (['BUY', 'SELL', 'WAIT'].includes(nextSignal) && nextSignal !== currentSignal) {
                currentSignal = nextSignal;
                display.innerText = currentSignal;
                display.className = `signal ${currentSignal.toLowerCase()}`;
                
                if (triggerSound && (currentSignal === 'BUY' || currentSignal === 'SELL')) {
                    playAlarmSound(currentSignal);
                }
            }
        }

        function sendSignal(targetSignal) {
            set(signalRef, targetSignal)
            .then(() => console.log("구글 서버 박제 성공: " + targetSignal))
            .catch(err => alert("서버 전송 오류: " + err));
        }

        document.getElementById('btnBuy').onclick = () => sendSignal('BUY');
        document.getElementById('btnWait').onclick = () => sendSignal('WAIT');
        document.getElementById('btnSell').onclick = () => sendSignal('SELL');
        document.getElementById('btnCopy').onclick = () => {
            navigator.clipboard.writeText(document.getElementById('walletAddr').innerText).then(() => {
                alert('Wallet address copied! Thank you for your support. ☕');
            });
        };

        onValue(signalRef, (snapshot) => {
            const val = snapshot.val();
            if (val) {
                const isFirstLoad = (currentSignal === 'WAIT' && val === 'WAIT');
                applySignal(val.trim().toUpperCase(), !isFirstLoad);
            }
        });
    </script>
</body>
</html>
