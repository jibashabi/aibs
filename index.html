<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BSAI - BTC 15M Signal</title>
    <style>
        body { background-color: #0c0c0c; color: #ffffff; font-family: 'Arial', sans-serif; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .title { font-size: 24px; font-weight: bold; color: #ff6600; margin-bottom: 5px; letter-spacing: 2px; }
        .alarm-status { font-size: 12px; color: #666; margin-bottom: 20px; background: #111; padding: 4px 10px; border-radius: 20px; border: 1px solid #222; }
        .signal { font-size: 12vw; font-weight: 900; text-transform: uppercase; transition: all 0.5s ease; text-shadow: 0 0 20px rgba(255,255,255,0.1); }
        .wait { color: #555555; }
        .buy { color: #00ff66; text-shadow: 0 0 50px rgba(0,255,102,0.6); }
        .sell { color: #ff3333; text-shadow: 0 0 50px rgba(255,51,51,0.6); }
        
        /* 🕹️ 제어 버튼 디자인 */
        .admin-panel { display: none; gap: 15px; margin-top: 30px; z-index: 10; }
        .btn { font-size: 20px; font-weight: bold; padding: 15px 30px; border: none; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .btn-buy { background: #00ff66; color: #000; }
        .btn-wait { background: #555; color: #fff; }
        .btn-sell { background: #ff3333; color: #fff; }
        .btn:hover { transform: scale(1.05); }

        .donation-box { position: absolute; bottom: 40px; display: flex; flex-direction: column; align-items: center; background: #151515; padding: 15px 25px; border-radius: 12px; border: 1px solid #222; }
        .donation-text { font-size: 12px; color: #aaa; margin-bottom: 8px; text-align: center; }
        .qr-code { width: 100px; height: 100px; margin-bottom: 10px; border-radius: 6px; }
        .wallet-container { display: flex; align-items: center; background: #000; padding: 5px 10px; border-radius: 6px; }
        .wallet-addr { font-size: 11px; color: #888; font-family: monospace; max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .copy-btn { background: #ff6600; color: white; border: none; padding: 4px 8px; margin-left: 8px; border-radius: 4px; font-size: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="title">BSAI</div>
    <div id="alarmInfo" class="alarm-status">🔊 Click anywhere to enable sound alerts</div>
    
    <div id="signalDisplay" class="signal wait">WAIT</div>

    <div id="adminPanel" class="admin-panel">
        <button class="btn btn-buy" onclick="saveSignal('BUY')">BUY</button>
        <button class="btn btn-wait" onclick="saveSignal('WAIT')">WAIT</button>
        <button class="btn btn-sell" onclick="saveSignal('SELL')">SELL</button>
    </div>

    <div class="donation-box">
        <div class="donation-text">This tool is 100% free. Buy me a coffee if this helped! ☕<br><strong style="color:#00ff66;">USDT (TRC-20 Network only)</strong></div>
        <img class="qr-code" src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=0xd5268a702bcbfef79e41b429be8a4f73285c32cd" alt="QR Code">
        <div class="wallet-container">
            <span class="wallet-addr" id="walletAddr">0xd5268a702bcbfef79e41b429be8a4f73285c32cd</span>
            <button class="copy-btn" onclick="copyAddress()">COPY</button>
        </div>
    </div>

    <script>
        // 고정 정보 설정
        const GITHUB_USER = 'jibashabi';        
        const GITHUB_REPO = 'aibs';             

        let currentSignal = 'WAIT';
        let audioCtx = null;
        let GITHUB_TOKEN = ''; // 마스터 키는 주소창에서 실시간으로 긁어옵니다.

        // 💡 주소창에서 마스터키(token)가 붙어있는지 확인합니다.
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('admin')) {
            GITHUB_TOKEN = urlParams.get('admin'); // ?admin=ghp_xxx 형태에서 ghp_xxx를 가져옴
            if (GITHUB_TOKEN) {
                document.getElementById('adminPanel').style.display = 'flex'; // 키가 있으면 버튼 보여주기
            }
        }

        window.addEventListener('click', () => {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                document.getElementById('alarmInfo').innerText = '🔔 Sound alerts are active';
                document.getElementById('alarmInfo').style.color = '#00ff66';
            }
        });

        function playAlarmSound(type) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            if (type === 'BUY') {
                osc.frequency.setValueAtTime(880, audioCtx.currentTime); gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                osc.start(); osc.stop(audioCtx.currentTime + 0.15);
                setTimeout(() => {
                    const o2 = audioCtx.createOscillator(); const g2 = audioCtx.createGain();
                    o2.connect(g2); g2.connect(audioCtx.destination);
                    o2.frequency.setValueAtTime(880, audioCtx.currentTime); g2.gain.setValueAtTime(0.3, audioCtx.currentTime);
                    o2.start(); o2.stop(audioCtx.currentTime + 0.15);
                }, 200);
            } else if (type === 'SELL') {
                osc.frequency.setValueAtTime(330, audioCtx.currentTime); gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
                osc.start(); osc.stop(audioCtx.currentTime + 0.4);
            }
        }

        function applySignal(nextSignal, triggerSound = true) {
            const display = document.getElementById('signalDisplay');
            if (['BUY', 'SELL', 'WAIT'].includes(nextSignal) && nextSignal !== currentSignal) {
                currentSignal = nextSignal;
                display.innerText = currentSignal;
                display.className = `signal ${currentSignal.toLowerCase()}`;
                if (triggerSound && (currentSignal === 'BUY' || currentSignal === 'SELL')) {
                    playAlarmSound(currentSignal);
                }
            }
        }

        // 1.5초마다 깃허브 메모장을 읽어서 전 세계 화면 동기화
        function checkSignal() {
            fetch(`https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/main/signal.txt?t=` + new Date().getTime())
                .then(res => res.text())
                .then(text => {
                    applySignal(text.trim().toUpperCase(), true);
                })
                .catch(() => console.log("신호 대기 중..."));
        }

        // 버튼 누르면 내 마스터키로 깃허브 메모장을 자동 수정하는 함수
        async function saveSignal(targetSignal) {
            if (!GITHUB_TOKEN) {
                alert("조종 권한이 없습니다. 주소를 다시 확인하세요!");
                return;
            }
            const url = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/signal.txt`;
            
            try {
                const getRes = await fetch(url, { headers: { 'Authorization': `token ${GITHUB_TOKEN}` } });
                const getData = await getRes.json();
                const sha = getData.sha;

                const putRes = await fetch(url, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${GITHUB_TOKEN}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: `Update signal to ${targetSignal}`,
                        content: btoa(targetSignal),
                        sha: sha
                    })
                });

                if (putRes.ok) {
                    applySignal(targetSignal, false);
                    console.log(`영구 박제 성공: ${targetSignal}`);
                } else {
                    alert("송출 실패! 주소창의 토큰 값이 정확한지 확인하세요.");
                }
            } catch (err) {
                alert("오류 발생: " + err);
            }
        }

        setInterval(checkSignal, 1500);
        checkSignal();

        function copyAddress() {
            navigator.clipboard.writeText(document.getElementById('walletAddr').innerText).then(() => {
                alert('Wallet address copied! Thank you for your support. ☕');
            });
        }
    </script>
</body>
</html>
